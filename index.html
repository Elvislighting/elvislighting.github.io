<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Elvis Yi lighting design portfolio for theme parks, ceremonies, theatre, concerts, and architectural productions.">
  <title>Elvis Yi | Lighting Design Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header solid" data-header>
    <a class="brand" href="index.html" aria-label="Elvis Yi portfolio home">
      <span class="brand-mark">EY</span>
      <span>Elvis Yi</span>
    </a>
    <div class="brand-context" aria-hidden="true">
      <span data-i18n="selectedProjects">Selected Projects</span>
      <span data-i18n="workArchive">Work Archive</span>
    </div>
    <nav class="site-nav" aria-label="Main navigation">
      <a href="index.html" data-i18n="navHome">Home</a>
      <div class="language-toggle" aria-label="Language">
        <button type="button" data-lang-button="en" class="active">EN</button>
        <button type="button" data-lang-button="zh">中文</button>
      </div>
    </nav>
  </header>

  <main>
    <section class="section projects-section" id="projects">
      <div class="filters reveal" data-filters aria-label="Project filters"></div>
      <div class="project-grid" data-project-grid></div>
      <p class="empty-state" data-empty-state data-i18n="emptyState" hidden>No projects found for this filter.</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-signature">
      <span class="footer-name">Elvis Yi</span>
      <span class="footer-title" data-i18n="footerTitle">Lighting Designer / Lighting Systems Designer</span>
    </div>
    <p data-i18n="footerNote">Selected works across themed entertainment, theatre, ceremonies, and architectural environments.</p>
  </footer>

  <div class="lightbox" data-lightbox hidden>
    <button class="lightbox-close" type="button" data-lightbox-close aria-label="Close image preview">x</button>
    <img data-lightbox-image alt="">
  </div>

  <script src="data/projects.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
